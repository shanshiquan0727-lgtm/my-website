<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品原型目录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            padding: 40px 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: white; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); 
        }
        h1 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .nav-list { 
            list-style: none; 
            padding: 0; 
        }
        .nav-item { 
            margin-bottom: 15px; 
            border: 1px solid #e0e0e0; 
            border-radius: 12px; 
            transition: all 0.3s;
            overflow: hidden;
        }
        .nav-item:hover { 
            border-color: #667eea; 
            transform: translateX(5px); 
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15); 
        }
        .nav-link { 
            display: block; 
            padding: 24px; 
            text-decoration: none; 
            color: #333; 
            font-size: 16px;
            font-weight: 500;
        }
        .nav-link span { 
            color: #999; 
            font-size: 14px; 
            display: block; 
            margin-top: 6px;
            font-weight: normal;
        }
        .arrow {
            float: right;
            color: #ccc;
            margin-top: -40px;
            margin-right: 20px;
            font-size: 20px;
            transition: transform 0.3s;
        }
        .nav-item:hover .arrow {
            transform: translateX(5px);
            color: #667eea;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #ccc;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 产品原型展示</h1>
        <p class="subtitle">点击下面卡片查看详细原型</p>
        
        <ul class="nav-list">
            <!-- 核心页面：话术库 -->
            <li class="nav-item">
                <a href="话术库标签原型.html" class="nav-link">
                    💬 话术库标签原型
                    <span>智能话术分类、标签管理、快速检索功能</span>
                </a>
                <div class="arrow">→</div>
            </li>
            
            <!-- 如果你有其他页面，取消注释并修改 -->
            <!--
            <li class="nav-item">
                <a href="其他页面.html" class="nav-link">
                    📊 其他功能页面
                    <span>功能描述...</span>
                </a>
                <div class="arrow">→</div>
            </li>
            -->
        </ul>
        
        <div class="footer">
            原型版本 v1.0 | 用于产品演示
        </div>
    </div>
</body>
</html>
