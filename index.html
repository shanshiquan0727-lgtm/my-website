<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品原型目录</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg: #f6f8fb;
            --panel: #ffffff;
            --text: #202938;
            --muted: #667085;
            --line: #d8e0ea;
            --primary: #2563eb;
            --primary-soft: #eaf1ff;
            --danger-bg: #fff1f1;
            --danger: #b42318;
            --shadow: 0 18px 45px rgba(23, 34, 56, 0.08);
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        button {
            font: inherit;
        }
        .shell {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
            padding: 30px 0 42px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: flex-start;
            margin-bottom: 22px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 30px;
            line-height: 1.2;
        }
        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .btn {
            border: 0;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            color: #ffffff;
            background: var(--primary);
            transition: transform 0.2s, filter 0.2s;
            white-space: nowrap;
        }
        .btn:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }
        .btn.secondary {
            background: var(--primary-soft);
            color: #1d4ed8;
        }
        .btn:disabled {
            cursor: wait;
            opacity: 0.72;
            transform: none;
        }
        .panel {
            overflow: hidden;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid var(--line);
        }
        .panel-title {
            margin: 0;
            font-size: 18px;
        }
        .count {
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
        }
        .status {
            margin: 20px 20px 0;
            padding: 12px 14px;
            border-radius: 8px;
            background: #f1f5f9;
            color: #344054;
            font-size: 14px;
            line-height: 1.5;
        }
        .status.error {
            background: var(--danger-bg);
            color: var(--danger);
        }
        .prototype-list {
            display: grid;
            gap: 10px;
            padding: 20px;
        }
        .prototype-card {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(180px, 280px) auto;
            gap: 14px;
            align-items: center;
            min-height: 58px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            background: #ffffff;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }
        .prototype-card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 28px rgba(37, 99, 235, 0.12);
            transform: translateY(-2px);
        }
        .prototype-card h3 {
            margin: 0;
            font-size: 16px;
            line-height: 1.4;
            overflow-wrap: anywhere;
        }
        .prototype-card span {
            display: block;
            color: var(--muted);
            font-size: 13px;
            overflow-wrap: anywhere;
        }
        .prototype-card .arrow {
            color: var(--primary);
            font-size: 18px;
            line-height: 1;
        }
        .empty {
            margin: 20px;
            padding: 34px 20px;
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--muted);
            text-align: center;
            background: #fbfdff;
        }
        @media (max-width: 720px) {
            .shell {
                width: min(100% - 24px, 1080px);
                padding-top: 22px;
            }
            .topbar {
                display: block;
            }
            .actions {
                justify-content: flex-start;
                margin-top: 14px;
            }
            h1 {
                font-size: 26px;
            }
            .prototype-card {
                grid-template-columns: minmax(0, 1fr) auto;
            }
            .prototype-card span {
                grid-column: 1 / -1;
                grid-row: 2;
            }
            .prototype-card .arrow {
                grid-column: 2;
                grid-row: 1;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="topbar">
            <div>
                <h1>产品原型目录</h1>
                <p class="subtitle">当前仓库中的 HTML 原型页面</p>
            </div>
            <div class="actions">
                <button class="btn secondary" id="reloadBtn" type="button">刷新列表</button>
            </div>
        </div>

        <section class="panel">
            <div class="panel-header">
                <h2 class="panel-title">原型列表</h2>
                <span class="count" id="prototypeCount">正在加载</span>
            </div>
            <div class="status" id="statusBox">正在读取原型列表...</div>
            <div class="prototype-list" id="prototypeList"></div>
            <div class="empty" id="emptyState" hidden>当前目录还没有可展示的 HTML 原型。</div>
        </section>
    </main>

    <script>
        const STATIC_PROTOTYPES = [
            { name: "会话行为标签接入公共条件.html", type: "file" },
            { name: "群标签手动创建-交互原型.html", type: "file" },
            { name: "标签同步.html", type: "file" },
            { name: "任务执行-交互原型.html", type: "file" },
            { name: "话术库标签原型.html", type: "file" }
        ];

        const REPO = {
            owner: "shanshiquan0727-lgtm",
            name: "my-website",
            pathPrefix: ""
        };

        const els = {
            reloadBtn: document.getElementById("reloadBtn"),
            statusBox: document.getElementById("statusBox"),
            prototypeList: document.getElementById("prototypeList"),
            prototypeCount: document.getElementById("prototypeCount"),
            emptyState: document.getElementById("emptyState")
        };

        function contentsUrl() {
            const prefix = REPO.pathPrefix.replace(/^\/+|\/+$/g, "");
            const encodedPrefix = prefix
                .split("/")
                .filter(Boolean)
                .map(encodeURIComponent)
                .join("/");
            const suffix = encodedPrefix ? `/${encodedPrefix}` : "";
            return `https://api.github.com/repos/${REPO.owner}/${REPO.name}/contents${suffix}`;
        }

        function setStatus(message, type = "") {
            els.statusBox.textContent = message;
            els.statusBox.className = `status ${type}`.trim();
        }

        function fileTitle(filename) {
            return filename
                .replace(/\.html$/i, "")
                .replace(/[-_]+/g, " ")
                .trim();
        }

        function prototypeHref(filename) {
            const path = [REPO.pathPrefix, filename].filter(Boolean).join("/");
            return encodeURI(path);
        }

        function renderPrototypes(files) {
            els.prototypeList.innerHTML = "";
            els.emptyState.hidden = files.length > 0;
            els.prototypeCount.textContent = `${files.length} 个原型`;

            files.forEach((file) => {
                const link = document.createElement("a");
                link.className = "prototype-card";
                link.href = prototypeHref(file.name);
                link.target = "_blank";
                link.rel = "noopener";

                const title = document.createElement("h3");
                title.textContent = fileTitle(file.name);

                const meta = document.createElement("span");
                meta.textContent = file.name;

                const arrow = document.createElement("span");
                arrow.className = "arrow";
                arrow.textContent = "->";

                link.append(title, meta, arrow);
                els.prototypeList.appendChild(link);
            });
        }

        async function loadPrototypeList() {
            els.reloadBtn.disabled = true;
            renderPrototypes(STATIC_PROTOTYPES);
            setStatus("已显示可用原型。");

            try {
                const response = await fetch(contentsUrl(), {
                    headers: { "Accept": "application/vnd.github+json" }
                });

                if (!response.ok) {
                    throw new Error(`GitHub API 返回 ${response.status}`);
                }

                const items = await response.json();
                const files = (Array.isArray(items) ? items : [])
                    .filter((item) => item.type === "file")
                    .filter((item) => /\.html$/i.test(item.name))
                    .filter((item) => item.name.toLowerCase() !== "index.html")
                    .sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));

                if (files.length > 0) {
                    renderPrototypes(files);
                    setStatus("列表已更新。");
                }
            } catch (error) {
                renderPrototypes(STATIC_PROTOTYPES);
                setStatus("已显示可用原型；自动刷新列表暂时不可用。");
            } finally {
                els.reloadBtn.disabled = false;
            }
        }

        els.reloadBtn.addEventListener("click", loadPrototypeList);

        loadPrototypeList();
    </script>
</body>
</html>
